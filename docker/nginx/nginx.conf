worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Docker internal DNS — re-resolve mỗi 30s để tránh stale IP sau rebuild
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Upstream: FastAPI API servers ────────────────────────────────────────
    upstream api_backend {
        least_conn;
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN"           always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection "1; mode=block"       always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Content-Security-Policy (relaxed cho API/SSE)
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: ws:; font-src 'self' data:;"
            always;

        # ── Frontend (React build) ────────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            # Cache busting cho assets có hash
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Timeouts (agent có thể chạy lâu)
            proxy_connect_timeout  30s;
            proxy_read_timeout    120s;
            proxy_send_timeout     60s;
        }

        # ── SSE streaming ─────────────────────────────────────────────────────
        location /api/session/ {
            proxy_pass         http://api_backend/session/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Quan trọng cho SSE: tắt buffering
            proxy_buffering          off;
            proxy_cache              off;
            proxy_read_timeout      300s;
            chunked_transfer_encoding on;
            add_header X-Accel-Buffering no;
        }

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://api_backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ── Health check (internal) ───────────────────────────────────────────
        location /health {
            proxy_pass http://api_backend/health;
            access_log off;
        }

        # Block truy cập trực tiếp vào các path nhạy cảm
        location ~ /\. {
            deny all;
        }
    }
}
