# ─────────────────────────────────────────────────────────────────────────────
#  TravelBuddy AI — Docker Compose
#
#  Dev (Vite HMR):   docker compose up -d postgres redis api
#                    npm run dev  (localhost:3000 → proxy → api:8001)
#
#  Full stack:       docker compose up -d --build
#                    Truy cập: http://localhost:3000
#
#  Rebuild API:      docker compose up -d --build api
#  Rebuild Frontend: docker compose up -d --build frontend
#  Scale workers:    docker compose up -d --scale worker=4
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-travel_buddy}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-travelbuddy_postgres_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts chạy 1 lần khi volume rỗng (fresh install)
      - ./database/travel_buddy_db:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"   # host-only, dùng cho dev tools / migration
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-travel_buddy}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - travelbuddy

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_PASSWORD:-changeme_redis_pass}
        --bind 0.0.0.0
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_pass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - travelbuddy

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"   # dùng bởi Vite proxy khi dev (npm run dev)
    env_file: .env
    environment:
      # Ghi đè DB_HOST/REDIS_URL để dùng tên service nội bộ Docker
      DB_HOST:    postgres
      DB_PORT:    "5432"
      REDIS_URL:  redis://:${REDIS_PASSWORD:-changeme_redis_pass}@redis:6379/0
      SEARXNG_URL: http://searxng:8080
      API_HOST:   0.0.0.0
      API_PORT:   "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
    networks:
      - travelbuddy
    deploy:
      resources:
        limits:
          memory: 2G

  # ── React Frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - travelbuddy

  # ── SearXNG (private search engine) ────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL:   http://searxng:8080
      SEARXNG_SECRET_KEY: ${SEARXNG_SECRET_KEY:-changeme_searxng_secret}
    volumes:
      - ./docker/searxng:/etc/searxng:rw
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - travelbuddy

  # ── Agent Workers (Redis Streams consumers) ─────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST:    postgres
      DB_PORT:    "5432"
      REDIS_URL:  redis://:${REDIS_PASSWORD:-changeme_redis_pass}@redis:6379/0
      SEARXNG_URL: http://searxng:8080
    command: python -m src.queue.streams
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - travelbuddy

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  travelbuddy:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
